version: "3.9"

services:
  backend:
    build:
      context: ./IncidentTracker/IncidentTracker.Api
      dockerfile: Dockerfile
    container_name: puzzel-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - puzzel-network
    restart: unless-stopped

  frontend:
    build:
      context: ./IncidentTrackerClient
      dockerfile: Dockerfile
    container_name: puzzel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - puzzel-network
    restart: unless-stopped

networks:
  puzzel-network:
    driver: bridge