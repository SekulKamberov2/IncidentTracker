name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: |
          dotnet restore ./IncidentTracker/IncidentTracker.Api/
          dotnet build ./IncidentTracker/IncidentTracker.Api/ --configuration Release
      - name: Run tests
        run: dotnet test ./IncidentTracker/IncidentTracker.Api/ --configuration Release

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: ./IncidentTrackerClient
      - name: Build frontend
        run: npm run build
        working-directory: ./IncidentTrackerClient

  test-e2e:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Start Docker Compose
        run: docker-compose up -d --build
      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://localhost:5000/api/incidents > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          cd IncidentTrackerClient
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: |
          cd IncidentTrackerClient
          npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:3000
      - name: Stop Docker
        run: docker-compose down
        if: always()
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: IncidentTrackerClient/playwright-report/